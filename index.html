<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc mừng ngày Quốc tế Phụ nữ 8/3</title>

<style>

/* Reset */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'monospace', sans-serif;
background-color:#f7f7f7;
color:#333;
}

header{
background-color:#FFB6C1;
color:white;
text-align:center;
padding:30px;
}

header h1{
font-size:3em;
margin-bottom:10px;
}

header p{
font-size:1.2em;
}

.main-idea{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
width:100%;
}

/* khung trắng */

.intro{
background-color:white;
margin:20px;
padding:20px 20px 30px 20px;
border-radius:10px;
box-shadow:0 4px 8px rgba(0,0,0,0.1);
width:300px;
min-height:420px;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
}

/* ảnh */

.intro img{
width:100%;
height:260px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.intro img:hover{
transform:scale(1.05);
}

/* chữ instagram */

.insta-text{
margin-top:15px;
font-size:1.2em;
color:#555;
}

/* khung link instagram */

.insta-box{
margin-top:10px;
background-color:#FFB6C1;
padding:8px 15px;
border-radius:15px;
}

.insta-box a{
text-decoration:none;
color:white;
font-weight:bold;
}

.insta-box a:hover{
opacity:0.8;
}

/* 4 ảnh nằm ngang */

.image-row{
display:flex;
justify-content:space-evenly;
width:100%;
flex-wrap:wrap;
}

/* ảnh chung */

.big-image{
width:100%;
text-align:center;
margin-top:20px;
}

.big-image img{
width:600px;
border-radius:10px;
}

/* footer */

footer{
background-color:#FFB6C1;
color:white;
text-align:center;
padding:10px;
margin-top:20px;
}

/* ===== LÁ THƯ ===== */

.overlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:999;
}

/* quyển sổ */

.book{
position:relative;
width:500px;
height:420px;
perspective:1200px;
}

/* trang */

.page{
position:absolute;
width:100%;
height:100%;
background:#fff8fb;
border-radius:18px;
padding:35px;
box-shadow:0 0 15px rgba(0,0,0,0.2);
transform-origin:left;
transition:transform 0.8s;
backface-visibility:hidden;
}
.page p{
line-height:1.7;
font-size:16px;
text-align:left;
white-space:pre-line; /* cho phép xuống dòng */
}

/* thứ tự trang */

#page1{ z-index:3; }
#page2{ z-index:2; }
#page3{ z-index:1; }

.page2{
background:#fff3f8;
}

.page3{
background:#ffeaf2;
}

/* hiệu ứng lật */

.flip{
transform:rotateY(-180deg);
}

/* nút */

.page-buttons{
position:absolute;
bottom:15px;
right: 20px;
}

.page-buttons button{
background:#FFB6C1;
border:none;
padding:6px 12px;
border-radius:10px;
cursor:pointer;
margin:5px;
color:white;
}

.close{
position:absolute;
top:-35px;
right:-10px;
font-size:26px;
cursor:pointer;
color:white;
z-index:10;
}

</style>
</head>

<body>

<header>
<h1>Chúc mừng ngày Quốc tế Phụ nữ 8/3</h1>
<p>Từ ba con người chúc bốn con thú có một ngày 8/3 vui vẻ</p>
</header>

<div class="main-idea">

<div class="image-row">

<div class="intro">
<img src="Image/Quynh.jpg" onclick="showLetter(1)">
<p class="insta-text">Instagram:</p>
<div class="insta-box">
<a href="https://www.instagram.com/tdquynhhhhh/">Diễm Quỳnh</a>
</div>
</div>

<div class="intro">
<img src="Image/SOC.jpg" onclick="showLetter(2)">
<p class="insta-text">Instagram:</p>
<div class="insta-box">
<a href="https://www.instagram.com/_hquyn.eqpt_">Hạnh Quyên</a>
</div>
</div>

<div class="intro">
<img src="Image/BO.jpg" onclick="showLetter(3)">
<p class="insta-text">Instagram:</p>
<div class="insta-box">
<a href="https://www.instagram.com/ncmaizz___/">Châu Mai</a>
</div>
</div>

<div class="intro">
<img src="Image/PET.jpg" onclick="showLetter(4)">
<p class="insta-text">Instagram:</p>
<div class="insta-box">
<a href="https://www.instagram.com/_duckling.2206/">Kim Ngân</a>
</div>
</div>

</div>

<div class="big-image">
<img src="Image/Anh Quân.jpg">
</div>

</div>

<footer>
<p>&copy; CHUNG MINH LA ZOO</p>
</footer>

<!-- LÁ THƯ -->

<div class="overlay" id="overlay">

<div class="book">

<div class="close" onclick="closeLetter()">✖</div>

<div class="page" id="page1">

<h2 id="title"></h2>
<p id="content1"></p>

<div class="page-buttons">
<button onclick="nextPage()">Trang sau ➜</button>
</div>

</div>

<div class="page page2" id="page2">

<h2>💌</h2>
<p id="content2"></p>

<div class="page-buttons">
<button onclick="prevPage()">⬅ Trang trước</button>
<button onclick="nextPage2()">Trang sau ➜</button>
</div>

</div>

<div class="page page3" id="page3">

<h2>🌸 Lời chúc</h2>
<p id="content3"></p>

<div class="page-buttons">
<button onclick="prevPage2()">⬅ Trang trước</button>
</div>

</div>

</div>
<div class="close" onclick="closeLetter()">✖</div>

</div>

<script>

const letters = {

1:{
title:"Gửi Hạnh Quyên 💐",
p1:`Chúc bạn một ngày 8/3 thật vui vẻ.
Hy vọng hôm nay bạn sẽ nhận được thật nhiều niềm vui.
Cảm ơn vì đã luôn mang lại năng lượng tích cực.
Mong rằng những ngày sắp tới sẽ thật nhẹ nhàng.
Chúc bạn luôn giữ được nụ cười thật tươi.
Chúc mọi dự định của bạn đều thành công.
Hy vọng bạn sẽ có thật nhiều kỷ niệm đẹp.
Luôn mạnh mẽ và tự tin nhé.
Cảm ơn vì đã là một người bạn tuyệt vời.
Chúc bạn luôn hạnh phúc.`,
p2:`Một ngày nào đó khi nhìn lại,
hy vọng bạn sẽ thấy mình đã đi rất xa.
Không phải vì may mắn,
mà vì bạn đã cố gắng rất nhiều.
Mong rằng mọi khó khăn rồi sẽ qua.
Những điều tốt đẹp sẽ luôn ở phía trước.
Hãy luôn tin vào bản thân mình.
Vì bạn xứng đáng với những điều tuyệt vời.
Chúc bạn thật nhiều niềm vui.
Và thật nhiều tiếng cười.`,
p3:`Cuộc sống có thể đôi lúc mệt mỏi.
Nhưng mong rằng bạn luôn tìm được niềm vui nhỏ.
Một bản nhạc hay.
Một buổi chiều yên bình.
Một cuộc trò chuyện vui vẻ.
Một ngày nhiều năng lượng.
Một nụ cười bất chợt.
Một điều tốt đẹp bất ngờ.
Chúc bạn luôn bình an.
Happy Women's Day 🌸`
},

2:{
title:"Gửi Diễm Quỳnh 🌸",
p1:"Chúc bạn luôn mạnh mẽ và tự tin.",
p2:"Mong rằng mọi điều tốt đẹp sẽ đến với bạn.",
p3:"Happy Women's Day 💐"
},

3:{
title:"Gửi Châu Mai 🌷",
p1:"Chúc bạn luôn giữ được nụ cười dễ thương.",
p2:"Mong rằng mọi dự định của bạn đều thành công.",
p3:"Chúc bạn 8/3 thật vui 🌷"
},

4:{
title:"Gửi Kim Ngân 🌹",
p1:"Chúc bạn luôn hạnh phúc và vui vẻ.",
p2:"Hy vọng bạn sẽ có thật nhiều kỷ niệm đẹp.",
p3:"Chúc bạn một ngày 8/3 thật ý nghĩa 🌹"
}

}

function showLetter(num){

document.getElementById("overlay").style.display="flex"

document.getElementById("title").innerText=letters[num].title
document.getElementById("content1").innerText=letters[num].p1
document.getElementById("content2").innerText=letters[num].p2
document.getElementById("content3").innerText=letters[num].p3

resetPages()

}

function closeLetter(){
document.getElementById("overlay").style.display="none"
}

/* lật trang */

function nextPage(){
document.getElementById("page1").classList.add("flip")
}

function prevPage(){
document.getElementById("page1").classList.remove("flip")
}

function nextPage2(){
document.getElementById("page2").classList.add("flip")
}

function prevPage2(){
document.getElementById("page2").classList.remove("flip")
}

function resetPages(){
document.getElementById("page1").classList.remove("flip")
document.getElementById("page2").classList.remove("flip")
}

</script>

</body>
</html>
