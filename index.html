<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day 8/3 💐</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    color:white;
    overflow:hidden;
}

h1{
    margin-top:60px;
    font-size:38px;
    text-align:center;
}

.subtitle{
    margin-top:10px;
    font-size:18px;
    opacity:0.9;
}

.container{
    display:flex;
    justify-content:center;
    gap:80px;
    margin-top:100px;
}

.gift{
    font-size:90px;
    cursor:pointer;
    transition:0.4s;
}

.gift:hover{
    transform:scale(1.15);
}

/* Overlay */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:10;
}

/* Envelope */
.envelope{
    position:relative;
    width:320px;
    height:200px;
    background:#f08080;
    border-radius:10px;
    cursor:pointer;
    transition:0.6s;
}

.envelope::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#ff6b81;
    clip-path:polygon(0 0,50% 60%,100% 0);
    transition:0.6s;
}

.envelope.open::before{
    transform:rotateX(180deg);
    transform-origin:top;
}

/* Letter */
.letter{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0);
    width:280px;
    height:300px;
    background:#fffdf7;
    border-radius:10px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    transition:0.6s;
    color:#444;
    text-align:center;
}

.envelope.open + .letter{
    transform:translate(-50%,-120%) scale(1);
}

.letter h2{
    margin-bottom:15px;
    color:#e84393;
}

.close-btn{
    margin-top:15px;
    padding:6px 12px;
    background:#ff6b81;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

/* Hearts */
.heart{
    position:fixed;
    font-size:18px;
    animation:float 4s linear forwards;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-10vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<h1>🌷 Happy International Women's Day 🌷</h1>
<div class="subtitle">Hãy chọn một hộp quà để nhận lời chúc 💝</div>

<div class="container">
    <div class="gift" onclick="openEnvelope(0)">🎁</div>
    <div class="gift" onclick="openEnvelope(1)">🎁</div>
    <div class="gift" onclick="openEnvelope(2)">🎁</div>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay">
    <div>
        <div class="envelope" id="envelope" onclick="openLetter()"></div>

        <div class="letter">
            <h2>💌 Lời Chúc 8/3 💌</h2>
            <p id="letterText"></p>
            <button class="close-btn" onclick="closeLetter()">Đóng</button>
        </div>
    </div>
</div>

<script>

const messages = [
    "🌸 Chúc bạn luôn xinh đẹp, rạng rỡ và tự tin theo cách của riêng mình!",
    "💖 Mong rằng mỗi ngày của bạn đều tràn ngập yêu thương và niềm vui!",
    "✨ Chúc bạn luôn mạnh mẽ, thành công và đạt được mọi ước mơ!"
];

let currentMessage = 0;

function openEnvelope(index){
    currentMessage = index;
    document.getElementById("overlay").style.display="flex";
    document.getElementById("letterText").innerText = messages[index];
    createHearts();
}

function openLetter(){
    document.getElementById("envelope").classList.add("open");
    createHearts();
}

function closeLetter(){
    document.getElementById("overlay").style.display="none";
    document.getElementById("envelope").classList.remove("open");
}

function createHearts(){
    for(let i=0;i<15;i++){
        let heart=document.createElement("div");
        heart.className="heart";
        heart.innerHTML="💗";
        heart.style.left=Math.random()*100+"vw";
        heart.style.animationDuration=(Math.random()*2+2)+"s";
        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },4000);
    }
}

</script>

</body>
</html>
